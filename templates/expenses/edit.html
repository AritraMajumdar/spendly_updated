{% extends "base.html" %}
{% block title %}Edit Expense — Spendly{% endblock %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/expenses.css') }}">
{% endblock %}
{% block content %}
<div class="expenses-page">

    <header class="expenses-hero">
        <div class="expenses-hero-inner">
            <div class="expenses-hero-text">
                <h1 class="expenses-hero-title">Edit Expense</h1>
                <p class="expenses-hero-sub">Update the details of this expense</p>
            </div>
            <a href="{{ url_for('expense_list') }}" class="btn-ghost">
                <i data-lucide="arrow-left" class="btn-icon"></i>
                Back to expenses
            </a>
        </div>
    </header>

    <div class="expenses-body">
        <div class="expense-form-wrap">

            {% if error %}
            <div class="auth-error expense-form-error">
                <i data-lucide="alert-circle" class="alert-icon"></i>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('edit_expense', id=expense.id) }}" class="expense-form">

                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input class="form-input" id="amount" type="number" name="amount"
                               min="0.01" step="0.01" placeholder="0.00" required
                               value="{{ form.amount if form else expense.amount }}">
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select class="form-input" id="category" name="category" required>
                            <option value="" disabled>Select a category</option>
                            {% for cat in categories %}
                            <option value="{{ cat }}"
                                {% if form %}
                                    {% if form.category == cat %}selected{% endif %}
                                {% elif expense.category == cat %}selected
                                {% endif %}>
                                {{ cat }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input class="form-input" id="date" type="date" name="date" required
                           value="{{ form.date if form else expense.date }}">
                </div>

                <div class="form-group">
                    <label for="description">Description <span class="field-optional">(optional)</span></label>
                    <input class="form-input" id="description" type="text" name="description"
                           placeholder="What was this for?"
                           value="{{ form.description if form else (expense.description or '') }}">
                </div>

                <div class="expense-form-actions">
                    <button type="submit" class="btn-primary">Save changes</button>
                    <a href="{{ url_for('expense_list') }}" class="btn-ghost">Cancel</a>
                </div>

            </form>
        </div>
    </div>

</div>
{% endblock %}
